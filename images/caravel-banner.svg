<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200" fill="none" role="img" aria-label="Caravel">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E76FE"/>
      <stop offset="1" stop-color="#060d1a"/>
    </linearGradient>
    <linearGradient id="sail" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f8ff"/>
      <stop offset="1" stop-color="#c9ddff"/>
    </linearGradient>
  </defs>

  <rect width="480" height="200" rx="16" fill="url(#sky)"/>

  <!-- stars -->
  <g fill="#eaf2ff" opacity="0.7">
    <circle cx="70" cy="40" r="1.1"/>
    <circle cx="120" cy="26" r="0.8"/>
    <circle cx="300" cy="34" r="1"/>
    <circle cx="360" cy="22" r="0.9"/>
    <circle cx="420" cy="48" r="1.1"/>
    <circle cx="250" cy="20" r="0.8"/>
  </g>

  <!-- ship: caravela latina — three lateen sails, raked masts, high sterncastle. Bow left, stern right. -->
  <g transform="translate(27 47)">
    <!-- masts -->
    <path d="M34 70 V30 M58 70 V14 M84 60 V28" stroke="#eaf2ff" stroke-width="1.6" stroke-linecap="round" opacity="0.6"/>
    <!-- yards: long spars running low-forward to high-aft -->
    <path d="M12 59 L52 24 M28 45 L80 6 M64 53 L102 22" stroke="#eaf2ff" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>
    <!-- lateen sails -->
    <path d="M66 52 L100 24 Q106 40 98 60 Q82 58 66 52 Z" fill="url(#sail)" opacity="0.72"/>
    <path d="M30 44 L78 8 Q88 36 74 64 Q52 60 30 44 Z" fill="url(#sail)"/>
    <path d="M14 58 L50 26 Q58 46 48 66 Q30 64 14 58 Z" fill="url(#sail)" opacity="0.85"/>
    <!-- pennant -->
    <path d="M58 14 h13 l-4 3 l4 3 h-13 Z" fill="#eaf2ff"/>
    <!-- sterncastle -->
    <path d="M82 70 V60 H102 L100 70 Z" fill="#eaf2ff" opacity="0.9"/>
    <!-- hull -->
    <path d="M16 70 H104 L95 84 Q90 89 82 89 H38 Q30 89 25 84 Z" fill="#eaf2ff"/>
    <path d="M16 70 H104 L101 75 H19 Z" fill="#1E76FE" opacity="0.35"/>
  </g>

  <!-- waves -->
  <g stroke="#7fb5ff" stroke-width="2" opacity="0.55" fill="none" stroke-linecap="round">
    <path d="M0 172 q20 -8 40 0 t40 0 t40 0 t40 0 t40 0 t40 0 t40 0 t40 0 t40 0 t40 0 t40 0"/>
    <path d="M0 184 q20 -8 40 0 t40 0 t40 0 t40 0 t40 0 t40 0 t40 0 t40 0 t40 0 t40 0 t40 0" opacity="0.6"/>
  </g>

  <!-- wordmark -->
  <text x="180" y="135" text-anchor="left" font-family="Georgia, 'Times New Roman', serif" font-size="34" letter-spacing="3" fill="#eaf2ff" font-weight="500">CARAVEL</text>
  <text x="180" y="155" text-anchor="left" font-family="Georgia, 'Times New Roman', serif" font-size="18" letter-spacing="3" fill="#eaf2ff" font-weight="500">your crew, your way</text>
</svg>
