brief: |
  Survey current Capacitor / Cordova plugins for Bluetooth Low Energy
  central-mode use on iOS and Android. We need to receive advertisements
  from a fleet of GPS pucks during a coverage survey. Constraints:
  - active maintenance in the last 12 months
  - permissive licence (MIT / Apache / BSD)
  - works in background mode on iOS
  Reject anything ble-peripheral-only.

output_format: |
  Markdown table with columns: name, repo URL, last commit, licence,
  iOS background support (yes/no/unknown), maintenance signal (1-5),
  notable caveats. Append a one-paragraph recommendation naming the
  preferred plugin and why.

